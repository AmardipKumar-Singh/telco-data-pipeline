# Telco Data Pipeline Configuration
# Dataset: cabbage-dog/The-AI-Telco-Troubleshooting-Challenge
# Ingested via HuggingFaceConnector from local snapshot

pipeline:
  name: telco_troubleshooting_pipeline
  version: "2.0.0"
  description: >
    Ingests the AI Telco Troubleshooting Challenge dataset from the local
    HuggingFace cache snapshot, performs feature engineering, runs SQL
    aggregations, and writes results to PostgreSQL / HDFS for downstream
    ML training and evaluation.

# --- HuggingFace Dataset Source ---
huggingface:
  dataset_id: "cabbage-dog/The-AI-Telco-Troubleshooting-Challenge"
  split: "train"
  cache_dir: "~/.cache/huggingface/hub"
  # Absolute path to snapshot downloaded by `hf download`
  local_snapshot: "~/.cache/huggingface/hub/datasets--cabbage-dog--The-AI-Telco-Troubleshooting-Challenge/snapshots/fa38dde4e55b5a821154c8311b48b4738b92eee7"

# --- Kafka (streaming mode — bypassed in --local runs) ---
kafka:
  bootstrap_servers: "${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}"
  topic_input: telco_troubleshooting_raw
  topic_output: telco_troubleshooting_processed
  consumer_group: telco_pipeline_cg
  batch_size: 1000
  poll_timeout_ms: 5000
  auto_offset_reset: earliest

# --- PostgreSQL ---
sql:
  host: "${POSTGRES_HOST:-localhost}"
  port: 5432
  database: "${POSTGRES_DB:-telco_pipeline}"
  user: "${POSTGRES_USER:-pipeline_user}"
  password: "${POSTGRES_PASSWORD:-changeme}"
  pool_size: 10
  max_overflow: 5
  tables:
    raw_events: telco_qa_events
    aggregated: telco_qa_aggregations
    pipeline_metrics: pipeline_run_metrics

# --- HDFS / Local FS ---
storage:
  mode: local           # Options: local | hdfs
  local_base_path: "./data/intermediate"
  hdfs_base_path: "hdfs://localhost:9000/telco_pipeline"
  checkpoint_dir: "./data/checkpoints"
  parquet_compression: snappy

# --- Spark ---
spark:
  app_name: TelcoTroubleshootingPipeline
  master: "local[4]"    # Change to yarn/k8s for cluster
  executor_memory: 4g
  driver_memory: 2g
  parallelism: 8
  shuffle_partitions: 8
  log_level: WARN

# --- Pipeline Stages ---
stages:
  - name: ingest
    type: HuggingFaceConnector
    enabled: true
    config:
      dataset_id: "cabbage-dog/The-AI-Telco-Troubleshooting-Challenge"
      split: "train"
      local_snapshot: "~/.cache/huggingface/hub/datasets--cabbage-dog--The-AI-Telco-Troubleshooting-Challenge/snapshots/fa38dde4e55b5a821154c8311b48b4738b92eee7"

  - name: validate
    type: DataValidator
    enabled: true
    config:
      required_columns:
        - question
        - answer
      null_threshold: 0.05

  - name: feature_engineering
    type: TelcoFeatureEngineeringStage
    enabled: true
    config:
      difficulty_map:
        easy:   1.0
        medium: 2.0
        hard:   3.0

  - name: spark_transform
    type: SparkTransformationStage
    enabled: true
    config:
      operations:
        - type: filter
          condition: "answer_index >= 0"    # keep only rows with matched answers
        - type: drop_nulls
          columns: [question, answer]

  - name: sql_aggregation
    type: SQLAggregationStage
    enabled: true
    config:
      output_table: telco_qa_aggregations
      # query: override here if needed; defaults to category/difficulty breakdown

  - name: write_results
    type: HDFSConnector
    enabled: true
    config:
      mode: overwrite

# --- Orchestration ---
orchestration:
  max_retries: 3
  retry_backoff_seconds: 5
  checkpoint_on_failure: true
  metrics_log_interval_seconds: 30
  backpressure_threshold: 5000
